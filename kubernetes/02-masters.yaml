---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cubefs-master
  namespace: cubefs
data:
  config-base.json: |
    {
     "role": "master",
     "id":"0",
     "ip": "127.0.0.1",
     "listen": "17010",
     "prof":"17020",
     "peers": "1:127.0.0.1:17010,2:127.0.0.2:17010,3:127.0.0.3:17010",
     "retainLogs":"20000",
     "logDir": "/cubefs/master/log",
     "logLevel":"info",
     "walDir":"/cubefs/master/data/wal",
     "storeDir":"/cubefs/master/data/store",
     "exporterPort": 9500,
     "clusterName":"cubefs-big",
     "metaNodeReservedMem": "1073741824"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cubefs-master
  namespace: cubefs
spec:
  selector:
    matchLabels:
      cubefs-role: master
  template:
    metadata:
      labels:
        cubefs-role: master
    spec:
      # only run on nodes with proper label
      nodeSelector:
        "component.cubefs.io/master": enabled
      containers:
        - name: master
          image: ghcr.io/geraldwodni/cubefs-k8s-server:v0.3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          #command:
          #  - sleep
          #  - 99d
          volumeMounts:
            - name: layout
              mountPath: /etc/layout.json
              subPath: layout.json
              readOnly: true
            - name: config
              mountPath: /etc/config-base.json
              subPath: config-base.json
              readOnly: true
            - name: cubefs
              mountPath: /cubefs
          imagePullPolicy: Always
      hostNetwork: true
      volumes:
        - name: layout
          configMap:
            name: cubefs-layout
        - name: config
          configMap:
            name: cubefs-master
        - name: cubefs
          hostPath:
            path: /data0/cubefs
